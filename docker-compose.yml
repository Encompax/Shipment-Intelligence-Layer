services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "4000"
      DATABASE_URL: "file:/data/app.db"
    volumes:
      - backend_db:/data
    networks:
      - internal

  sil:
    build:
      context: ./backend/sil
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      SIL_PORT: "3001"
      SIL_HOST: "0.0.0.0"
      SIL_DB_PATH: "/data/sil.db"
    volumes:
      - sil_db:/data
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - sil
      - frontend
    networks:
      - internal

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h;
             done"

volumes:
  backend_db:
  sil_db:
  certbot_www:
  certbot_certs:

networks:
  internal:
