worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        # TODO: replace with your domain (e.g., ethos-shipment-intelligence.com)
        server_name ethos-shipment-intelligence.local;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        # TODO: replace with your domain (e.g., ethos-shipment-intelligence.com)
        server_name ethos-shipment-intelligence.local;

        # Update cert paths to match your domain
        ssl_certificate     /etc/letsencrypt/live/ethos-shipment-intelligence.local/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ethos-shipment-intelligence.local/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── SIL (Shipment Intelligence Layer) ────────────────────────────────
        location /api/sil/ {
            proxy_pass         http://sil:3001/api/sil/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:4000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── React frontend (SPA) ──────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend:80/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
