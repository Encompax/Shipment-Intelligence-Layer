<svg xmlns="http://www.w3.org/2000/svg" viewBox="-24 -24 48 48">
  <!-- Dark background circle -->
  <circle r="24" fill="#1A1A1A"/>

  <!-- Seed of Life: 7 overlapping circles (r=8), center + 6 at 60° intervals -->
  <!-- The three stacked passes create natural petal depth at intersections -->
  <defs>
    <clipPath id="outer-clip">
      <circle r="21.5"/>
    </clipPath>
  </defs>

  <g clip-path="url(#outer-clip)">
    <!-- Pass 1: subtle base fill -->
    <g fill="#B91C1C" fill-opacity="0.2" stroke="none">
      <circle cx="0"   cy="0"      r="8"/>
      <circle cx="8"   cy="0"      r="8"/>
      <circle cx="4"   cy="6.928"  r="8"/>
      <circle cx="-4"  cy="6.928"  r="8"/>
      <circle cx="-8"  cy="0"      r="8"/>
      <circle cx="-4"  cy="-6.928" r="8"/>
      <circle cx="4"   cy="-6.928" r="8"/>
    </g>
    <!-- Pass 2: mid fill so intersections accumulate -->
    <g fill="#DC2626" fill-opacity="0.22" stroke="none">
      <circle cx="0"   cy="0"      r="8"/>
      <circle cx="8"   cy="0"      r="8"/>
      <circle cx="4"   cy="6.928"  r="8"/>
      <circle cx="-4"  cy="6.928"  r="8"/>
      <circle cx="-8"  cy="0"      r="8"/>
      <circle cx="-4"  cy="-6.928" r="8"/>
      <circle cx="4"   cy="-6.928" r="8"/>
    </g>
    <!-- Pass 3: strokes define the circle outlines -->
    <g fill="none" stroke="#EF4444" stroke-width="0.75" stroke-opacity="0.85">
      <circle cx="0"   cy="0"      r="8"/>
      <circle cx="8"   cy="0"      r="8"/>
      <circle cx="4"   cy="6.928"  r="8"/>
      <circle cx="-4"  cy="6.928"  r="8"/>
      <circle cx="-8"  cy="0"      r="8"/>
      <circle cx="-4"  cy="-6.928" r="8"/>
      <circle cx="4"   cy="-6.928" r="8"/>
    </g>
  </g>

  <!-- Outer ring matching the Encompax logo border -->
  <circle r="21.5" fill="none" stroke="#B91C1C" stroke-width="1.4"/>
</svg>
